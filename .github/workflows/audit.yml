name: Azure DevOps Technical Audit

on:
  schedule:
    # Runs at 00:00 UTC every Saturday
    - cron: '0 0 * * 6'
  workflow_dispatch:
    inputs:
      days:
        description: 'Número de días a extraer'
        required: false
        default: '30'

jobs:
  audit:
    runs-on: ubuntu-latest

    env:
      AZURE_DEVOPS_INSTANCE: ${{ secrets.AZURE_DEVOPS_INSTANCE }}
      AZURE_DEVOPS_COLLECTION: ${{ secrets.AZURE_DEVOPS_COLLECTION }}
      AZURE_DEVOPS_PROJECT: ${{ secrets.AZURE_DEVOPS_PROJECT }}
      AZURE_DEVOPS_REPOSITORY_NAME: ${{ secrets.AZURE_DEVOPS_REPOSITORY_NAME }}
      AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
      AZURE_DEVOPS_USERNAME: ${{ secrets.AZURE_DEVOPS_USERNAME }}
      DAYS_TO_EXTRACT: ${{ github.event.inputs.days || secrets.DAYS_TO_EXTRACT || '30' }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Audit Generator
      run: |
        python main.py

    - name: Commit and Push generated reports
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add Documentacion/
        # Check if there are changes to commit before pushing
        git diff-index --quiet HEAD || (git commit -m "docs: auto-generated technical audit reports [skip ci]" && git push)
